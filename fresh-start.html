<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aleph Fresh Start</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8f5;
        color: #172027;
      }

      main {
        width: min(680px, calc(100vw - 32px));
        background: #ffffff;
        border: 1px solid #dde3dd;
        border-radius: 8px;
        padding: 28px;
        box-shadow: 0 16px 40px rgba(23, 32, 39, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 32px;
      }

      p {
        color: #5d6872;
        line-height: 1.55;
      }

      code {
        background: #edf3ef;
        border-radius: 4px;
        padding: 2px 6px;
      }

      a {
        color: #2f6372;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Aleph fresh start</h1>
      <p id="status">Clearing old Aleph browser state, service workers, and caches...</p>
      <p>Expected build after redirect: <code>seeded-user-canonical-workspace-v75</code>.</p>
      <p><a id="home-link" href="/?fresh=seeded-user-canonical-workspace-v75">Open Aleph</a></p>
    </main>
    <script>
      async function clearAlephState() {
        localStorage.removeItem("learning-studio-data-v1");
        localStorage.removeItem("learning-studio-data-v2");
        sessionStorage.removeItem("aleph-session");

        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }

        document.querySelector("#status").textContent = "Cleared. Redirecting to the fresh Aleph build...";
        window.location.replace("/?fresh=seeded-user-canonical-workspace-v75");
      }

      clearAlephState().catch((error) => {
        document.querySelector("#status").textContent = `Fresh start failed: ${error.message}`;
      });
    </script>
  </body>
</html>
